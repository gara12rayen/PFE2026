version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: 3lm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pfe
    volumes:
      - db_data:/var/lib/mysql
      - ./combined_database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3307"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: 3lm_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: pfe
      SECRET_KEY: changez-cette-cle-en-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_DAYS: 7
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      UPLOAD_DIR: app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: 3lm_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads: